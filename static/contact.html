<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — {{BUSINESS_NAME}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    .card-header {
      background: #0a0a0a;
      padding: 28px 32px;
    }

    .card-header h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-header p {
      color: #888;
      font-size: 13px;
    }

    .card-body { padding: 28px 32px 32px; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .required { color: #ef4444; margin-left: 2px; }

    input, select, textarea {
      width: 100%;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      padding: 11px 14px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
      font-family: inherit;
      line-height: 1.5;
    }

    input:focus, select:focus, textarea:focus { border-color: #4169e1; }
    input::placeholder, textarea::placeholder { color: #aaa; }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 110px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      width: 100%;
      background: #0a0a0a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn:hover { background: #222; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    .error.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success screen */
    .success-screen {
      padding: 48px 32px;
      text-align: center;
      display: none;
    }

    .success-screen.visible { display: block; }

    .checkmark {
      width: 56px;
      height: 56px;
      background: #eef2ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
    }

    .success-screen h2 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    .success-screen p {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
    }

    .form-view.hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>{{BUSINESS_NAME}}</h1>
      <p>Tell us what you need. We'll get back to you within minutes.</p>
    </div>

    <div class="form-view" id="formView">
      <div class="card-body">
        <div class="field">
          <label>Your Name</label>
          <input type="text" id="contactName" placeholder="e.g. James Carter" />
        </div>

        <div class="field">
          <label>Email Address <span class="required">*</span></label>
          <input type="email" id="contactEmail" placeholder="your@email.com" />
        </div>

        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="contactPhone" placeholder="e.g. 07700 900123" />
        </div>

        <div class="field">
          <label>Property Address</label>
          <input type="text" id="contactAddress" placeholder="e.g. 12 Oak Street, Manchester" />
        </div>

        <div class="field">
          <label>Service Needed</label>
          <select id="contactService">
            <option value="">Select a service...</option>
            <option value="Lawn Mowing">Lawn Mowing</option>
            <option value="Hedge Trimming">Hedge Trimming</option>
            <option value="Garden Clearance">Garden Clearance</option>
            <option value="Turf Treatment">Turf Treatment</option>
            <option value="Leaf Clearance">Leaf Clearance</option>
            <option value="Patio / Driveway Cleaning">Patio / Driveway Cleaning</option>
            <option value="Tree &amp; Shrub Pruning">Tree &amp; Shrub Pruning</option>
            <option value="One-off Garden Makeover">One-off Garden Makeover</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="row">
          <div class="field">
            <label>Preferred Date <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#aaa;">(optional)</span></label>
            <input type="date" id="contactDate" />
          </div>
          <div class="field">
            <label>Preferred Time <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#aaa;">(optional)</span></label>
            <select id="contactTime">
              <option value="">Any time</option>
              <option value="8:00 AM – 10:00 AM">8:00 AM – 10:00 AM</option>
              <option value="10:00 AM – 12:00 PM">10:00 AM – 12:00 PM</option>
              <option value="12:00 PM – 2:00 PM">12:00 PM – 2:00 PM</option>
              <option value="2:00 PM – 4:00 PM">2:00 PM – 4:00 PM</option>
              <option value="4:00 PM – 6:00 PM">4:00 PM – 6:00 PM</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Message <span class="required">*</span></label>
          <textarea id="contactMessage" placeholder="Describe what you need help with..."></textarea>
        </div>

        <button class="btn" id="contactSubmitBtn" onclick="submitContact()">Send Request</button>
        <div class="error" id="contactError"></div>
      </div>
    </div>

    <div class="success-screen" id="successScreen">
      <div class="checkmark">&#10003;</div>
      <h2>We'll be in touch shortly!</h2>
      <p>Check your inbox — a response from <strong>{{BUSINESS_NAME}}</strong> is on its way.</p>
    </div>
  </div>

  <script>
    (function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('contactDate').min = today;
    })();

    async function submitContact() {
      const name = document.getElementById("contactName").value.trim();
      const email = document.getElementById("contactEmail").value.trim();
      const phone = document.getElementById("contactPhone").value.trim();
      const service = document.getElementById("contactService").value;
      const address = document.getElementById("contactAddress").value.trim();
      const preferred_date = document.getElementById("contactDate").value;
      const preferred_time = document.getElementById("contactTime").value;
      const message = document.getElementById("contactMessage").value.trim();

      const btn = document.getElementById("contactSubmitBtn");
      const errorEl = document.getElementById("contactError");
      errorEl.classList.remove("visible");

      if (!email) { showErr("Please enter your email address."); return; }
      if (!message) { showErr("Please describe what you need help with."); return; }

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span>Sending...`;

      try {
        const res = await fetch("/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, phone, address, service, preferred_date, preferred_time, message }),
        });

        const data = await res.json();

        if (data.error) {
          showErr(data.error);
          btn.disabled = false;
          btn.textContent = "Send Request";
        } else {
          document.getElementById("formView").classList.add("hidden");
          document.getElementById("successScreen").classList.add("visible");
        }
      } catch (err) {
        showErr("Something went wrong. Please try again.");
        btn.disabled = false;
        btn.textContent = "Send Request";
      }
    }

    function showErr(msg) {
      const el = document.getElementById("contactError");
      el.textContent = msg;
      el.classList.add("visible");
    }
  </script>
</body>
</html>
